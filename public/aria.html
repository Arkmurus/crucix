<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARIA — ARKMURUS</title>
  <link rel="icon" type="image/png" href="images/fav-icon/icon.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/crucix.css">
  <link rel="stylesheet" href="fonts/bootstrap-icons/font-css.css">
  <style>
    #app-main { padding: 0; display: flex; flex-direction: column; height: calc(100vh - var(--header-h)); overflow: hidden; }
    .aria-shell { display: flex; flex-direction: column; height: 100%; background: #0f0a1e; }
    .aria-header { display:flex; align-items:center; gap:10px; padding:0 20px; height:50px; background:#13092a; border-bottom:1px solid rgba(255,255,255,0.07); flex-shrink:0; }
    .aria-avatar { width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#913BFF,#0066FF);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0; }
    .aria-title { font-size:13px;font-weight:700;letter-spacing:2px;color:#ce93d8; }
    .aria-desc { font-size:11px;color:rgba(255,255,255,.35); }
    .aria-status { display:flex;align-items:center;gap:5px;font-size:11px;color:#22c55e;margin-left:auto; }
    .aria-status-dot { width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 0 rgba(34,197,94,.4);animation:pulse 2s infinite; }
    @keyframes pulse { 70%{box-shadow:0 0 0 6px rgba(34,197,94,0)} 100%{box-shadow:0 0 0 0 rgba(34,197,94,0)} }
    .messages { flex:1;overflow-y:auto;padding:20px 0;display:flex;flex-direction:column;gap:4px; }
    .msg-wrap { padding:4px 24px; animation:fadeUp .2s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .msg-aria { display:flex;gap:10px;align-items:flex-start;max-width:800px; }
    .aria-dot { width:8px;height:8px;border-radius:50%;background:#913BFF;margin-top:8px;flex-shrink:0; }
    .aria-text { font-size:14px;line-height:1.75;color:rgba(255,255,255,.85);white-space:pre-wrap;word-break:break-word; }
    .msg-user { display:flex;justify-content:flex-end; }
    .user-bubble { max-width:70%;background:rgba(145,59,255,.18);border:1px solid rgba(145,59,255,.3);border-radius:16px 16px 4px 16px;padding:10px 14px; }
    .user-text { font-size:14px;line-height:1.6;color:rgba(255,255,255,.88);white-space:pre-wrap;word-break:break-word; }
    .msg-time { font-size:10px;color:rgba(255,255,255,.2);margin-top:4px; }
    .user-time { text-align:right; }
    .thinking-bar { display:flex;gap:4px;padding:6px 0; }
    .thinking-bar span { width:4px;height:4px;border-radius:50%;background:#913BFF;animation:bp 1.2s ease-in-out infinite; }
    .thinking-bar span:nth-child(2){animation-delay:.15s} .thinking-bar span:nth-child(3){animation-delay:.3s}
    @keyframes bp { 0%,80%,100%{opacity:.2;transform:scaleY(.6)} 40%{opacity:1;transform:scaleY(1)} }
    .input-bar { padding:12px 20px 16px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.06);background:#13092a; }
    .input-wrap { background:#1d1245;border:1px solid rgba(255,255,255,.1);border-radius:12px;transition:border-color .2s; }
    .input-wrap:focus-within { border-color:#913BFF;box-shadow:0 0 0 2px rgba(145,59,255,.15); }
    .chat-ta { display:block;width:100%;background:transparent;border:none;outline:none;color:#fff;font-size:14px;line-height:1.6;padding:12px 16px 8px;resize:none;font-family:inherit;min-height:24px;max-height:140px;overflow-y:auto; }
    .chat-ta::placeholder { color:rgba(255,255,255,.25); }
    .input-foot { display:flex;align-items:center;justify-content:space-between;padding:0 12px 10px 16px; }
    .input-hint { font-size:11px;color:rgba(255,255,255,.2); }
    .send-btn { width:32px;height:32px;border-radius:8px;border:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s; }
    .send-btn.ready { background:#913BFF;color:#fff;box-shadow:0 2px 10px rgba(145,59,255,.5); }
    .send-btn.ready:hover { background:#0066FF; }
    .send-btn:disabled { opacity:.35;cursor:not-allowed; }
  </style>
</head>
<body>
<div id="sidebar-placeholder"></div>
<div id="header-placeholder"></div>
<main id="app-main">
<div class="aria-shell">
  <div class="aria-header">
    <div class="aria-avatar">A</div>
    <div>
      <div class="aria-title">ARIA</div>
      <div class="aria-desc">Arkmurus Research Intelligence Agent</div>
    </div>
    <div class="aria-status">
      <div class="aria-status-dot"></div>Online
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="msg-wrap">
      <div class="msg-aria">
        <div class="aria-dot"></div>
        <div>
          <div class="aria-text">Hello. I'm ARIA — your intelligence assistant. Ask me anything about defense markets, procurement opportunities, compliance, or the latest intelligence brief.</div>
          <div class="msg-time">Now</div>
        </div>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea class="chat-ta" id="chat-input" placeholder="Ask ARIA anything about intelligence, markets, compliance…" rows="1" oninput="autoResize(this);checkBtn()" onkeydown="handleKey(event)"></textarea>
      <div class="input-foot">
        <span class="input-hint">Shift+Enter for new line · Enter to send</span>
        <button class="send-btn" id="send-btn" onclick="sendMsg()" disabled><i class="bi bi-send"></i></button>
      </div>
    </div>
  </div>
</div>
</main>

<script src="vendor/jquery.min.js"></script>
<script src="js/app.js"></script>
<script src="js/sidebar.js"></script>
<script>
Auth.requireAuth();
Sidebar.init('aria');

const messages = [];

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 140) + 'px';
}

function checkBtn() {
  const v = document.getElementById('chat-input').value.trim();
  const btn = document.getElementById('send-btn');
  btn.disabled = !v;
  btn.className = v ? 'send-btn ready' : 'send-btn';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!document.getElementById('send-btn').disabled) sendMsg(); }
}

function appendMsg(role, text) {
  const el = document.getElementById('messages');
  const time = new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
  const div = document.createElement('div');
  div.className = 'msg-wrap';
  if (role === 'user') {
    div.innerHTML = `<div class="msg-user"><div class="user-bubble"><div class="user-text">${escHtml(text)}</div><div class="msg-time user-time">${time}</div></div></div>`;
  } else {
    div.innerHTML = `<div class="msg-aria"><div class="aria-dot"></div><div><div class="aria-text" id="last-aria"></div><div class="msg-time">${time}</div></div></div>`;
  }
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
  return div;
}

function showThinking() {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg-wrap'; div.id = 'thinking';
  div.innerHTML = `<div class="msg-aria"><div class="aria-dot" style="animation:dot-breathe 1.4s ease-in-out infinite"></div><div class="thinking-bar"><span></span><span></span><span></span></div></div>`;
  el.appendChild(div); el.scrollTop = el.scrollHeight;
}

async function sendMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto'; checkBtn();

  appendMsg('user', text);
  messages.push({ role: 'user', content: text });

  const btn = document.getElementById('send-btn');
  btn.disabled = true; btn.className = 'send-btn';
  showThinking();

  try {
    const { ok, data } = await API.post('/api/aria/chat', { messages, context: 'dashboard' });
    document.getElementById('thinking')?.remove();

    if (!ok || !data) {
      appendMsg('aria', 'Sorry, I encountered an error. Please try again.');
    } else {
      const reply = data.reply || data.content || data.message || '';
      appendMsg('aria', reply);
      messages.push({ role: 'assistant', content: reply });
      if (messages.length > 40) messages.splice(0, 2); // keep context manageable
    }
  } catch (e) {
    document.getElementById('thinking')?.remove();
    appendMsg('aria', 'Connection error. Please try again.');
  }

  btn.disabled = false; checkBtn();
}
</script>
<style>
@keyframes dot-breathe { 0%,100%{background:#4a148c;transform:scale(.8)} 50%{background:#ce93d8;transform:scale(1.2)} }
</style>
</body>
</html>
