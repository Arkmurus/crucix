<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — ARKMURUS</title>
  <link rel="icon" type="image/png" href="images/fav-icon/icon.png">
  
  <link rel="stylesheet" href="css/crucix.css?v=3">
  <link rel="stylesheet" href="fonts/bootstrap-icons/font-css.css">
  <style>
    .user-card { background:#1d1245; border:1px solid rgba(255,255,255,0.08); border-radius:10px; margin-bottom:10px; overflow:hidden; }
    .user-card.pending { border-color:rgba(255,213,79,0.25); }
    .user-main { display:flex; align-items:center; gap:12px; padding:12px 16px; flex-wrap:wrap; border-bottom:1px solid rgba(255,255,255,0.05); }
    .user-av { width:38px; height:38px; border-radius:50%; background:rgba(145,59,255,0.2); border:1px solid rgba(145,59,255,0.3); color:#ce93d8; font-size:14px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .user-name { font-size:14px; font-weight:700; color:#fff; }
    .user-meta { font-size:12px; color:rgba(255,255,255,0.4); margin-top:2px; }
    .user-actions { display:flex; align-items:center; gap:6px; padding:8px 16px; flex-wrap:wrap; }
    .action-btn { font-size:12px; padding:5px 12px; border-radius:6px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.7); cursor:pointer; display:inline-flex; align-items:center; gap:5px; transition:all .15s; }
    .action-btn:hover { background:rgba(255,255,255,0.1); color:#fff; }
    .action-btn.approve { border-color:rgba(34,197,94,0.3); color:#86efac; }
    .action-btn.approve:hover { background:rgba(34,197,94,0.12); }
    .action-btn.reject, .action-btn.delete { border-color:rgba(239,68,68,0.3); color:#fca5a5; }
    .action-btn.reject:hover, .action-btn.delete:hover { background:rgba(239,68,68,0.1); }
    .action-btn.logout-btn { border-color:rgba(255,122,65,0.3); color:#fdba74; }
    .role-sel { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:4px; color:#ce93d8; font-size:12px; padding:4px 8px; outline:none; cursor:pointer; }
    .role-sel option { background:#1d1245; }
    .tab-btns { display:flex; gap:2px; border-bottom:1px solid rgba(255,255,255,0.07); margin-bottom:20px; }
    .tab-btn { background:none; border:none; border-bottom:2px solid transparent; color:rgba(255,255,255,0.45); font-size:13px; padding:10px 16px; cursor:pointer; font-weight:500; transition:all .15s; }
    .tab-btn.active { color:#fff; border-bottom-color:#913BFF; font-weight:600; }
    .tab-panel { display:none; } .tab-panel.active { display:block; }
  </style>
</head>
<body>
<div id="sidebar-placeholder"></div>
<div id="header-placeholder"></div>
<main id="app-main">
  <div class="sc-page-header">
    <h1 class="sc-page-title"><i class="bi bi-shield-lock"></i> User Management</h1>
    <p class="sc-page-sub">Manage user accounts, roles and access</p>
  </div>

  <div id="msg-bar" style="display:none"></div>

  <div class="tab-btns">
    <button class="tab-btn active" onclick="switchTab('all',this)">All Users <span class="sc-badge sc-badge-muted" id="cnt-all">0</span></button>
    <button class="tab-btn" onclick="switchTab('pending',this)">Pending <span class="sc-badge sc-badge-orange" id="cnt-pending">0</span></button>
    <button class="tab-btn" onclick="switchTab('audit',this)">Audit Log</button>
  </div>

  <div id="tab-all"     class="tab-panel active"><div class="sc-loading-state"><div class="sc-spinner"></div></div></div>
  <div id="tab-pending" class="tab-panel"><div class="sc-loading-state"><div class="sc-spinner"></div></div></div>
  <div id="tab-audit"   class="tab-panel"><div class="sc-loading-state"><div class="sc-spinner"></div></div></div>
</main>
<script src="js/app.js?v=3"></script>
<script src="js/sidebar.js?v=3"></script>
<script>
if (!Auth.requireAdmin()) throw new Error('Not admin');
Sidebar.init('admin');

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if (name === 'audit') loadAudit();
}

function showMsg(msg, type='success') {
  const el = document.getElementById('msg-bar');
  el.className = `sc-alert sc-alert-${type}`;
  el.textContent = msg; el.style.display = 'flex';
  setTimeout(() => el.style.display='none', 4000);
}

function userCard(u) {
  const initials = Auth.initials({fullName: u.fullName, username: u.username});
  const statusClass = u.status==='active'?'sc-badge-green':u.status==='pending'?'sc-badge-orange':'sc-badge-red';
  return `<div class="user-card ${u.status==='pending'?'pending':''}" id="user-${u.id}">
    <div class="user-main">
      <div class="user-av">${initials}</div>
      <div style="flex:1;min-width:0">
        <div class="user-name">${escHtml(u.fullName||u.username||'')}</div>
        <div class="user-meta">${escHtml(u.email||'')} · @${escHtml(u.username||'')}</div>
      </div>
      <span class="sc-badge ${statusClass}">${escHtml(u.status||'')}</span>
      <select class="role-sel" onchange="changeRole('${u.id}',this.value)">
        ${['viewer','analyst','admin'].map(r=>`<option value="${r}"${u.role===r?' selected':''}>${r}</option>`).join('')}
      </select>
    </div>
    <div class="user-actions">
      ${(u.status==='pending_approval'||u.status==='pending_verification')?`
        <button class="action-btn approve" onclick="approveUser('${u.id}')"><i class="bi bi-check-lg"></i> Approve</button>
        <button class="action-btn reject" onclick="rejectUser('${u.id}')"><i class="bi bi-x-lg"></i> Reject</button>
      `:''}
      ${u.status==='active'?`<button class="action-btn logout-btn" onclick="forceLogout('${u.id}')"><i class="bi bi-box-arrow-right"></i> Force Logout</button>`:''}
      <button class="action-btn delete" onclick="deleteUser('${u.id}')"><i class="bi bi-trash"></i> Delete</button>
      ${u.lastLogin?`<span style="font-size:11px;color:rgba(255,255,255,.3);margin-left:auto">Last login: ${fmtDateTime(u.lastLogin)}</span>`:''}
    </div>
  </div>`;
}

let allUsers = [];

async function loadUsers() {
  const data = await API.get('/api/admin/users');
  allUsers = data || [];
  const pending = allUsers.filter(u=>u.status==='pending_approval'||u.status==='pending_verification');
  document.getElementById('cnt-all').textContent = allUsers.length;
  document.getElementById('cnt-pending').textContent = pending.length;
  document.getElementById('tab-all').innerHTML = allUsers.length ? allUsers.map(userCard).join('') : '<p class="text-muted">No users found.</p>';
  document.getElementById('tab-pending').innerHTML = pending.length ? pending.map(userCard).join('') : '<p class="text-muted" style="padding:20px">No pending accounts.</p>';
}

async function approveUser(id) {
  alert('Approve clicked for user: ' + id);
  try {
    var r = await fetch('/api/admin/users/' + id + '/approve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('crucix_token') },
      body: '{}'
    });
    var data = {};
    try { data = await r.json(); } catch(e) { data = { error: 'Server returned non-JSON: ' + r.status }; }
    if (r.ok) { alert('SUCCESS: User approved!'); loadUsers(); }
    else { alert('FAILED: ' + (data.error || 'HTTP ' + r.status)); }
  } catch (e) { alert('ERROR: ' + e.message); }
}

async function rejectUser(id) {
  if (!confirm('Reject and remove this user?')) return;
  try {
    var r = await fetch('/api/admin/users/' + id + '/reject', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('crucix_token') },
      body: '{}'
    });
    var data = {};
    try { data = await r.json(); } catch(e) { data = {}; }
    if (r.ok) { showMsg('User rejected'); loadUsers(); }
    else { showMsg('Reject failed: ' + (data.error || 'HTTP ' + r.status), 'error'); }
  } catch (e) { showMsg('Network error: ' + e.message, 'error'); }
}
async function forceLogout(id) {
  try {
    var r = await API.post('/api/admin/users/' + id + '/force-logout', {});
    if (r.ok) showMsg('User logged out'); else showMsg('Failed', 'error');
  } catch (e) { showMsg('Error: ' + e.message, 'error'); }
}
async function deleteUser(id) {
  if (!confirm('Permanently delete this user?')) return;
  const { ok, data } = await API.del(`/api/admin/users/${id}`);
  if (ok) { showMsg('User deleted'); loadUsers(); } else showMsg(data.error||'Failed','error');
}
async function changeRole(id, role) {
  const { ok, data } = await API.put(`/api/admin/users/${id}`, { role });
  if (ok) showMsg('Role updated'); else showMsg(data.error||'Failed','error');
}

async function loadAudit() {
  const el = document.getElementById('tab-audit');
  const data = await API.get('/api/admin/audit');
  const log = (data||[]);
  el.innerHTML = log.length ? `<table class="sc-table"><thead><tr><th>Action</th><th>Target</th><th>By</th><th>When</th></tr></thead><tbody>
    ${log.slice(0,50).map(e=>`<tr>
      <td><strong style="font-size:12px">${escHtml(e.action||'')}</strong></td>
      <td style="font-size:12px">${escHtml(e.targetEmail||e.target||'')}${e.targetName?`<br><span style="font-size:10px;color:rgba(255,255,255,.3)">${escHtml(e.targetName)}</span>`:''}</td>
      <td style="font-size:12px">${escHtml(e.adminEmail||e.byEmail||e.by||'')}</td>
      <td style="font-size:11px;color:rgba(255,255,255,.35)">${fmtDateTime(e.ts||e.timestamp||e.at)}</td>
    </tr>`).join('')}
  </tbody></table>` : '<p class="text-muted" style="padding:20px">No audit records.</p>';
}

loadUsers();
</script>
</body>
</html>
