<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Source Health — ARKMURUS</title>
  <link rel="icon" type="image/png" href="images/fav-icon/icon.png">
  
  <link rel="stylesheet" href="css/crucix.css?v=3">
  <link rel="stylesheet" href="fonts/bootstrap-icons/font-css.css">
</head>
<body>
<div id="sidebar-placeholder"></div>
<div id="header-placeholder"></div>
<main id="app-main">
  <div class="sc-page-header">
    <h1 class="sc-page-title"><i class="bi bi-activity"></i> Source Health</h1>
    <p class="sc-page-sub">Real-time status of all intelligence data sources</p>
  </div>

  <!-- Summary row -->
  <div class="sc-grid-4 mb-24">
    <div class="sc-stat"><div class="sc-stat-icon green"><i class="bi bi-check-circle"></i></div><div><div class="sc-stat-value" id="src-ok">—</div><div class="sc-stat-label">Active Sources</div></div></div>
    <div class="sc-stat"><div class="sc-stat-icon red"><i class="bi bi-x-circle"></i></div><div><div class="sc-stat-value" id="src-err">—</div><div class="sc-stat-label">Failed Sources</div></div></div>
    <div class="sc-stat"><div class="sc-stat-icon orange"><i class="bi bi-exclamation-triangle"></i></div><div><div class="sc-stat-value" id="src-warn">—</div><div class="sc-stat-label">Degraded</div></div></div>
    <div class="sc-stat"><div class="sc-stat-icon blue"><i class="bi bi-clock"></i></div><div><div class="sc-stat-value" id="src-last">—</div><div class="sc-stat-label">Last Sweep</div></div></div>
  </div>

  <div class="sc-card">
    <div class="sc-card-header">
      <div class="sc-card-title"><i class="bi bi-database"></i> All Sources</div>
    </div>
    <div style="padding:0">
      <table class="sc-table" id="src-table">
        <thead><tr><th>Source</th><th>Status</th><th>Reliability</th><th>Latency</th><th>Fetches</th></tr></thead>
        <tbody id="src-body"><tr><td colspan="5" style="text-align:center;padding:40px"><div class="sc-spinner"></div></td></tr></tbody>
      </table>
    </div>
  </div>
</main>
<script src="js/app.js?v=3"></script>
<script src="js/sidebar.js?v=3"></script>
<script>
Auth.requireAuth();
Sidebar.init('sources');

async function loadSources() {
  const data = await API.get('/api/source-health');
  if (!data) return;
  const sources = data.sources || [];
  const ok   = sources.filter(s => s.lastStatus === 'ok').length;
  const err  = sources.filter(s => s.lastStatus === 'error').length;
  const warn = sources.filter(s => s.reliability !== null && s.reliability < 80 && s.lastStatus !== 'error').length;
  document.getElementById('src-ok').textContent   = ok;
  document.getElementById('src-err').textContent  = err;
  document.getElementById('src-warn').textContent = warn;
  document.getElementById('src-last').textContent = data.asOf ? fmtDateTime(data.asOf) : '—';

  document.getElementById('src-body').innerHTML = sources.map(s => {
    const isOk  = s.lastStatus === 'ok';
    const isErr = s.lastStatus === 'error';
    const dotCls = isOk ? 'ok' : isErr ? 'error' : 'warn';
    const reliColor = s.reliability === null ? 'rgba(255,255,255,.3)'
                    : s.reliability >= 80   ? '#22c55e'
                    : s.reliability >= 50   ? '#FF7A41' : '#ef4444';
    return `<tr>
      <td><strong>${escHtml(s.name || '')}</strong></td>
      <td>
        <span class="status-dot ${dotCls}" style="margin-right:6px;display:inline-block;
          width:7px;height:7px;border-radius:50%;background:${isOk?'#22c55e':isErr?'#ef4444':'#FF7A41'};vertical-align:middle"></span>
        <span style="font-size:12px;text-transform:capitalize">${escHtml(s.lastStatus || '—')}</span>
      </td>
      <td style="font-size:12px;font-weight:700;color:${reliColor}">
        ${s.reliability !== null ? s.reliability + '%' : '—'}
      </td>
      <td style="font-size:12px;color:rgba(255,255,255,.4)">
        ${s.lastMs ? s.lastMs + 'ms' : '—'}
      </td>
      <td style="font-size:12px;color:rgba(255,255,255,.4)">
        ${s.ok || 0}ok / ${s.fail || 0}fail
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="5" style="text-align:center;color:rgba(255,255,255,.4);padding:30px">No source data yet — run a sweep first</td></tr>';
}

loadSources();
</script>
</body>
</html>
