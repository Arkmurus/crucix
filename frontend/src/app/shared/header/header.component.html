<header class="top-header mat-elevation-z5" [class.hidden]="toggleSearch" [ngClass]="{'test': getSideBarSate()}">
  <div class="flex-grow-1 gap-1 d-flex align-items-center">
    <button mat-icon-button (click)="toggleSidebar()">
      <mat-icon class="material-icons-outlined">menu</mat-icon>
    </button>
    <button mat-icon-button (click)="openSearch()">
      <mat-icon class="material-icons-outlined">search</mat-icon>
    </button>
    <span class="text-muted small d-none d-md-inline ms-2" style="font-family:monospace;letter-spacing:.5px">ARKMURUS INTELLIGENCE</span>
  </div>

  <div class="d-flex align-items-center gap-1">

    <!-- Dark/light mode -->
    <button mat-icon-button (click)="darkMode()" title="Toggle theme">
      <mat-icon class="material-icons-outlined">{{ theme_name }}</mat-icon>
    </button>

    <!-- Source health quick-link -->
    <button mat-icon-button routerLink="/dashboard/sources" title="Source Health">
      <mat-icon class="material-icons-outlined">sensors</mat-icon>
    </button>

    <!-- User profile menu -->
    <button mat-icon-button [matMenuTriggerFor]="UserProfile" title="{{ displayName }}">
      <!-- Show initials circle when logged in, generic icon when not -->
      <span *ngIf="currentUser"
            style="width:32px;height:32px;border-radius:50%;background:#1565c0;color:#fff;
                   display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700">
        {{ userInitials }}
      </span>
      <mat-icon *ngIf="!currentUser" class="material-icons-outlined">account_circle</mat-icon>
    </button>

    <mat-menu #UserProfile class="rounded-4 dropdown-userprofile">
      <!-- Logged in state -->
      <ng-container *ngIf="currentUser">
        <div class="px-3 py-2" style="min-width:220px">
          <div class="d-flex align-items-center gap-2">
            <span style="width:44px;height:44px;border-radius:50%;background:#1565c0;color:#fff;
                         display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0">
              {{ userInitials }}
            </span>
            <div>
              <div class="fw-bold" style="font-size:14px">{{ displayName }}</div>
              <div class="text-muted" style="font-size:12px">{{ displayEmail }}</div>
              <span class="badge bg-primary" style="font-size:10px">{{ roleBadge }}</span>
            </div>
          </div>
        </div>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="goProfile()">
          <mat-icon class="material-icons-outlined">manage_accounts</mat-icon>
          <span>My Profile</span>
        </button>
        <button mat-menu-item (click)="goDashboard()">
          <mat-icon class="material-icons-outlined">radar</mat-icon>
          <span>Intelligence Brief</span>
        </button>
        <button mat-menu-item routerLink="/dashboard/sources">
          <mat-icon class="material-icons-outlined">sensors</mat-icon>
          <span>Source Health</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()" style="color:#f44336">
          <mat-icon class="material-icons-outlined" style="color:#f44336">logout</mat-icon>
          <span>Sign Out</span>
        </button>
      </ng-container>

      <!-- Not logged in -->
      <ng-container *ngIf="!currentUser">
        <div class="px-3 py-2 text-muted small">Not signed in</div>
        <mat-divider></mat-divider>
        <button mat-menu-item routerLink="/auth/sign-in">
          <mat-icon class="material-icons-outlined">login</mat-icon>
          <span>Sign In</span>
        </button>
      </ng-container>
    </mat-menu>

  </div>
</header>

<!-- Search toolbar -->
<mat-toolbar class="searchbar mat-elevation-z5 justify-content-between"
             [ngClass]="{'full-search': getSideBarSate()}"
             [class.searchVisible]="toggleSearch">
  <button mat-icon-button class="btn-search" (click)="onSearch()">
    <mat-icon class="material-icons-outlined">search</mat-icon>
  </button>
  <input class="w-100 search-control"
         placeholder="Search companies, entities, people..."
         [(ngModel)]="searchQuery"
         (keyup.enter)="onSearch()"
         autocomplete="off">
  <button mat-icon-button class="btn-search" (click)="searchClose()">
    <mat-icon class="material-icons-outlined">close</mat-icon>
  </button>
</mat-toolbar>
