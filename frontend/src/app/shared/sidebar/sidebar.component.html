<aside class="sidebar-wrapper mat-elevation-z9" [ngClass]="{'mini-sidebar' : getSideBarSate()}">
  <div class="sidebar-header">
    <img src="assets/images/app/logo-icon-2.png" width="28">
    <div class="logo-name">ARKMURUS</div>
  </div>
  <nav class="sidebar-menu">
    <mat-accordion class="example-headers-align" multi>

      <!-- ── Intelligence ── -->
      <mat-expansion-panel [class.mat-elevation-z0]="true" [expanded]="true">
        <mat-expansion-panel-header>
          <mat-icon class="material-icons-outlined">radar</mat-icon>Intelligence
        </mat-expansion-panel-header>
        <mat-nav-list>
          <a mat-list-item routerLink="dashboard/brief">
            <mat-icon>summarize</mat-icon>Brief
          </a>
          <a mat-list-item routerLink="dashboard/opportunities">
            <mat-icon>business_center</mat-icon>Opportunities
          </a>
          <a mat-list-item routerLink="dashboard/bd-intelligence">
            <mat-icon>trending_up</mat-icon>BD Intelligence
          </a>
          <a mat-list-item routerLink="dashboard/explorer">
            <mat-icon>travel_explore</mat-icon>Explorer
          </a>
        </mat-nav-list>
      </mat-expansion-panel>

      <!-- ── System ── -->
      <mat-expansion-panel [class.mat-elevation-z0]="true">
        <mat-expansion-panel-header>
          <mat-icon class="material-icons-outlined">settings</mat-icon>System
        </mat-expansion-panel-header>
        <mat-nav-list>
          <a mat-list-item routerLink="dashboard/sources">
            <mat-icon>sensors</mat-icon>Source Health
          </a>
        </mat-nav-list>
      </mat-expansion-panel>

      <!-- ── Admin (role-gated) ── -->
      <mat-expansion-panel *ngIf="isAdmin()" [class.mat-elevation-z0]="true">
        <mat-expansion-panel-header>
          <mat-icon class="material-icons-outlined">admin_panel_settings</mat-icon>Admin
        </mat-expansion-panel-header>
        <mat-nav-list>
          <a mat-list-item routerLink="admin/users">
            <mat-icon>manage_accounts</mat-icon>Users
          </a>
        </mat-nav-list>
      </mat-expansion-panel>

      <!-- ── Messaging ── -->
      <mat-expansion-panel [class.mat-elevation-z0]="true">
        <mat-expansion-panel-header>
          <mat-icon class="material-icons-outlined">forum</mat-icon>
          Messaging
          <span class="badge bg-primary ms-1" *ngIf="chatUnread > 0" style="font-size:10px;padding:2px 6px;">{{ chatUnread }}</span>
        </mat-expansion-panel-header>
        <mat-nav-list>
          <a mat-list-item routerLink="chat">
            <mat-icon>chat</mat-icon>
            Messages
            <span class="badge bg-primary ms-1" *ngIf="chatUnread > 0" style="font-size:10px;padding:2px 6px;">{{ chatUnread }}</span>
          </a>
        </mat-nav-list>
      </mat-expansion-panel>

      <!-- ── Separator ── -->
      <mat-nav-list>
        <mat-divider></mat-divider>
        <a mat-list-item href="/" target="_blank">
          <mat-icon class="material-icons-outlined">public</mat-icon>3D Globe View
        </a>
      </mat-nav-list>

    </mat-accordion>
  </nav>
</aside>
