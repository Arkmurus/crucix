<div class="landing-bg position-fixed top-0 start-0 end-0 bottom-0"
     style="background:#0a0e1a;"></div>

<!-- Grid pattern overlay -->
<div class="position-fixed top-0 start-0 end-0 bottom-0"
     style="background-image:linear-gradient(rgba(30,64,175,.08) 1px,transparent 1px),
            linear-gradient(90deg,rgba(30,64,175,.08) 1px,transparent 1px);
            background-size:40px 40px;"></div>

<div class="position-fixed top-0 start-0 end-0 bottom-0 d-flex flex-column align-items-center justify-content-center z-1 px-3">

  <!-- Logo + wordmark -->
  <div class="text-center mb-5">
    <img src="assets/images/app/favicon-32x32.png" width="52" alt="Arkmurus" class="mb-4"
         style="filter:drop-shadow(0 0 12px rgba(59,130,246,.6));">
    <div style="font-family:monospace;letter-spacing:4px;font-size:11px;color:#3b82f6;text-transform:uppercase;margin-bottom:8px;">
      ARKMURUS
    </div>
    <h1 style="font-size:clamp(22px,4vw,36px);font-weight:700;color:#e2e8f0;letter-spacing:1px;margin:0 0 12px;">
      Intelligence Platform
    </h1>
    <p style="color:#64748b;font-size:14px;max-width:360px;line-height:1.6;margin:0 auto;">
      Real-time OSINT · Defense procurement signals · Lusophone &amp; Africa coverage
    </p>
  </div>

  <!-- Action card -->
  <div style="width:100%;max-width:380px;">
    <div style="background:rgba(17,24,39,.95);border:1px solid #1e3a5f;border-radius:12px;padding:32px;">

      <div class="d-grid gap-3">
        <a mat-flat-button color="primary" routerLink="/auth/sign-in"
           style="padding:14px;font-size:15px;font-weight:600;letter-spacing:.5px;border-radius:8px;">
          <mat-icon class="me-2">login</mat-icon>Sign In
        </a>
        <a mat-stroked-button routerLink="/auth/sign-up"
           style="padding:14px;font-size:15px;font-weight:600;letter-spacing:.5px;border-radius:8px;
                  border-color:#1e40af;color:#60a5fa;">
          <mat-icon class="me-2">person_add</mat-icon>Create Account
        </a>
      </div>

      <div class="text-center mt-4" style="font-size:12px;color:#475569;">
        Access is restricted to authorised personnel.
      </div>
    </div>
  </div>

  <!-- Footer wordmark -->
  <div class="mt-5 text-center" style="font-size:11px;color:#334155;letter-spacing:2px;font-family:monospace;">
    ARKMURUS · INTELLIGENCE · SECURE &nbsp;·&nbsp; © {{ year }}
  </div>

</div>
