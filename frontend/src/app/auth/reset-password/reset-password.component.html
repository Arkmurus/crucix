<div class="login-bg position-fixed top-0 start-0 end-0 bottom-0"
  style="background-image: url(assets/images/gallery/reset-password.png);">
</div>

<div class="auth-box d-flex align-items-center justify-content-center my-5 my-lg-0">
  <div class="container-fluid">
    <div class="row row-cols-1 row-cols-lg-2 row-cols-xl-3">
      <div class="col mx-auto">
        <mat-card class="rounded-4 m-2">
          <mat-card-content class="p-5">

            <div class="text-center mb-4">
              <a routerLink="/auth/landing"
                 style="font-family:'Manrope',sans-serif;font-size:24px;font-weight:800;
                        color:#ffffff;letter-spacing:3px;text-transform:uppercase;
                        text-decoration:none;display:inline-block;margin-bottom:8px;">
                ARKMURUS
              </a>
              <p class="mb-0 text-muted" style="font-size:13px;">Set a new password for your account</p>
            </div>

            <div class="alert alert-danger" *ngIf="errorMsg">{{ errorMsg }}</div>
            <div class="alert alert-success" *ngIf="successMsg">{{ successMsg }}</div>

            <form [formGroup]="form">
              <div class="row g-3">
                <div class="col-12">
                  <mat-form-field class="w-100 mb-0" appearance="outline">
                    <mat-label>New Password</mat-label>
                    <input matInput [type]="hide ? 'password' : 'text'" formControlName="password" autocomplete="new-password">
                    <button mat-icon-button matSuffix (click)="hide = !hide" type="button">
                      <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
                    </button>
                    <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
                    <mat-error *ngIf="form.get('password')?.hasError('minlength')">Minimum 8 characters</mat-error>
                  </mat-form-field>
                </div>
                <div class="col-12">
                  <mat-form-field class="w-100 mb-0" appearance="outline">
                    <mat-label>Confirm Password</mat-label>
                    <input matInput [type]="hideConfirm ? 'password' : 'text'" formControlName="confirmPassword" autocomplete="new-password">
                    <button mat-icon-button matSuffix (click)="hideConfirm = !hideConfirm" type="button">
                      <mat-icon>{{ hideConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
                    </button>
                  </mat-form-field>
                  <div class="text-danger small mt-1"
                       *ngIf="form.hasError('passwordsMismatch') && form.get('confirmPassword')?.touched">
                    Passwords do not match
                  </div>
                </div>
                <div class="col-12">
                  <div class="d-grid gap-2">
                    <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="loading"
                            style="padding:10px;font-size:14px;font-weight:600;">
                      {{ loading ? 'Resetting...' : 'Reset Password' }}
                    </button>
                    <button mat-stroked-button routerLink="../sign-in">Back to Sign In</button>
                  </div>
                </div>
              </div>
            </form>

          </mat-card-content>
        </mat-card>
      </div>
    </div>
  </div>
</div>
