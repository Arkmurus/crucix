<div class="login-bg position-fixed top-0 start-0 end-0 bottom-0"
  style="background-image: url(assets/images/gallery/forgot-password.png);">
</div>

<div class="auth-box d-flex align-items-center justify-content-center my-5 my-lg-0">
 <div class="container-fluid">
  <div class="row row-cols-1 row-cols-lg-2 row-cols-xl-3">
    <div class="col mx-auto">
      <mat-card class="rounded-4 m-2">
        <mat-card-content class="p-5">
          <div class="text-center">
            <img src="assets/images/app/favicon-32x32.png" class="mb-3" width="55" alt="Arkmurus">
            <h4 class="mb-2">Forgot Password?</h4>
            <p class="mb-4">Enter your registered email address to reset your password</p>
          </div>
          <div class="alert alert-danger" *ngIf="errorMsg">{{ errorMsg }}</div>
          <div class="alert alert-success" *ngIf="successMsg">{{ successMsg }}</div>
          <form [formGroup]="form">
            <div class="row g-3">
              <div class="col-12">
                <mat-form-field class="w-100 mb-0" appearance="outline">
                  <mat-label>Email</mat-label>
                  <input matInput placeholder="analyst@arkmurus.com" formControlName="email" type="email">
                  <mat-error *ngIf="form.get('email')?.hasError('required')">Email is required</mat-error>
                  <mat-error *ngIf="form.get('email')?.hasError('email')">Enter a valid email</mat-error>
                </mat-form-field>
              </div>
              <div class="col-12">
                <div class="d-grid gap-2">
                  <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="loading">
                    {{ loading ? 'Sending...' : 'Send Reset Link' }}
                  </button>
                  <button mat-stroked-button routerLink="../sign-in">Back to Sign In</button>
                </div>
              </div>
            </div>
          </form>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
 </div>
</div>
