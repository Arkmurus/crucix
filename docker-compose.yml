services:
  crucix:
    build: .
    ports:
      - "${PORT:-3117}:${PORT:-3117}"
    env_file:
      - .env
    volumes:
      - ./runs:/app/runs
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:${PORT:-3117}/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
