<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUCIX — Intelligence Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://d3js.org/topojson.v3.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl@2.33.0"></script>
<style>
/* ===== COMPLETE STYLES ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020408;--panel:rgba(6,14,22,0.82);--glass:rgba(10,20,32,0.55);
  --border:rgba(100,240,200,0.12);--border-bright:rgba(100,240,200,0.3);
  --text:#e8f4f0;--dim:#6a8a82;--accent:#64f0c8;--accent2:#44ccff;
  --warn:#ffb84c;--danger:#ff5f63;--mono:'IBM Plex Mono',monospace;--sans:'Space Grotesk',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}
.bg-grid{position:fixed;inset:0;pointer-events:none;opacity:0.3;background-image:linear-gradient(rgba(100,240,200,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(100,240,200,0.03) 1px,transparent 1px);background-size:60px 60px}
.bg-radial{position:fixed;inset:0;pointer-events:none;opacity:0.3;background:radial-gradient(ellipse at 50% 0%,rgba(40,120,100,0.15),transparent 50%)}
.scanline{position:fixed;inset:0;pointer-events:none;overflow:hidden;opacity:0.2}
.scanline::after{content:'';position:absolute;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,rgba(100,240,200,0.12),transparent);animation:scanMove 4s linear infinite}
@keyframes scanMove{0%{top:-2px}100%{top:100%}}
#boot{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg)}
.logo-ring{width:120px;height:120px;border:2px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;opacity:0}
.logo-ring::before{content:'';position:absolute;inset:-8px;border:1px solid var(--border);border-radius:50%;border-top-color:var(--accent);animation:spin 2s linear infinite}
.logo-ring::after{content:'';position:absolute;inset:-16px;border:1px solid rgba(100,240,200,0.06);border-radius:50%;border-bottom-color:rgba(100,240,200,0.15);animation:spin 3s linear infinite reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.logo-text{font-family:var(--mono);font-size:18px;font-weight:700;letter-spacing:0.2em;color:var(--accent)}
#bootLines{margin-top:32px;font-family:var(--mono);font-size:12px;color:var(--dim);text-align:left;line-height:2;min-width:340px;opacity:0}
#bootLines .ok{color:var(--accent)}
#bootFinal{margin-top:24px;font-family:var(--mono);font-size:14px;font-weight:600;color:var(--accent);letter-spacing:0.15em;opacity:0}
#main{opacity:0;min-height:100vh;position:relative;padding:10px 12px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border:1px solid var(--border);background:var(--panel);backdrop-filter:blur(20px);flex-wrap:wrap;gap:10px}
.top-left{display:flex;align-items:center;gap:14px}
.brand{font-family:var(--mono);font-weight:700;font-size:15px;letter-spacing:0.12em;text-transform:uppercase}
.regime-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;font-family:var(--mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;border:1px solid rgba(255,95,99,0.3);color:#ffd8d9;background:rgba(255,95,99,0.08)}
.regime-chip .blink{width:6px;height:6px;border-radius:50%;background:var(--danger);box-shadow:0 0 8px var(--danger);animation:pulse-blink 1.5s ease-in-out infinite}
@keyframes pulse-blink{0%,100%{opacity:1}50%{opacity:0.3}}
.top-center{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.region-btn{border:1px solid var(--border);background:rgba(255,255,255,0.02);color:var(--dim);font-family:var(--mono);font-size:11px;padding:6px 12px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.region-btn:hover{border-color:var(--accent);color:var(--text)}
.region-btn.active{color:#03140d;background:var(--accent);border-color:var(--accent)}
.top-right{display:flex;align-items:center;gap:10px}
.meta-pill{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:0.06em;padding:5px 10px;border:1px solid var(--border)}
.meta-pill .v{color:var(--text);font-weight:500}
.alert-badge{padding:5px 12px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;border:1px solid rgba(255,95,99,0.4);color:#fff;background:linear-gradient(135deg,rgba(255,95,99,0.2),rgba(255,95,99,0.08))}
.guide-btn{padding:5px 12px;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;border:1px solid rgba(68,204,255,0.28);color:var(--accent2);background:rgba(68,204,255,0.07);cursor:pointer}
.grid{display:grid;grid-template-columns:240px 1fr 340px;gap:10px;margin-top:10px;min-height:calc(100vh - 100px)}
.col{display:flex;flex-direction:column;gap:10px}
.g-panel{border:1px solid var(--border);background:var(--glass);backdrop-filter:blur(16px);padding:12px;position:relative;overflow:hidden}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-head h3{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim)}
.badge{font-family:var(--mono);font-size:10px;padding:2px 7px;border:1px solid var(--border);color:var(--accent)}
.layer-item{display:flex;align-items:center;justify-content:space-between;padding:8px;border:1px solid rgba(255,255,255,0.04);background:rgba(255,255,255,0.02);margin-bottom:4px}
.layer-left{display:flex;align-items:center;gap:8px}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ldot.air{background:var(--accent);box-shadow:0 0 6px rgba(100,240,200,0.4)}
.ldot.thermal{background:var(--danger);box-shadow:0 0 6px rgba(255,95,99,0.4)}
.ldot.sdr{background:var(--accent2);box-shadow:0 0 6px rgba(68,204,255,0.4)}
.ldot.nuke{background:#ffe082;box-shadow:0 0 6px rgba(255,224,130,0.4)}
.ldot.maritime{background:#b388ff;box-shadow:0 0 6px rgba(179,136,255,0.4)}
.ldot.health{background:#69f0ae}
.layer-name{font-size:12px;font-weight:500}
.layer-sub{font-size:10px;color:var(--dim)}
.layer-count{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent)}
.map-container{flex:1;min-height:560px;border:1px solid var(--border);background:radial-gradient(ellipse at center,rgba(4,12,20,1),rgba(2,4,8,1));position:relative;overflow:hidden}
#globeViz{width:100%;height:100%;cursor:grab}
#flatMapSvg{width:100%;height:100%;position:absolute;top:0;left:0;cursor:grab}
.map-legend{position:absolute;bottom:10px;left:12px;display:flex;gap:14px;font-family:var(--mono);font-size:10px;color:var(--dim);z-index:5;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-dot{width:8px;height:8px;border-radius:50%}
.map-hint{position:absolute;top:8px;right:12px;font-family:var(--mono);font-size:9px;color:var(--dim);z-index:5}
.map-controls{position:absolute;top:8px;left:12px;z-index:6;display:flex;flex-direction:column;gap:4px}
.map-ctrl-btn{width:28px;height:28px;border:1px solid var(--border);background:rgba(0,0,0,0.6);color:var(--dim);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.map-ctrl-btn:hover{color:var(--accent)}
.proj-toggle{position:absolute;top:8px;left:48px;z-index:6;padding:5px 10px;border:1px solid var(--border);background:rgba(0,0,0,0.6);font-family:var(--mono);font-size:9px;cursor:pointer;color:var(--dim)}
.map-popup{position:absolute;z-index:20;width:280px;padding:12px;background:rgba(6,10,14,0.95);border:1px solid rgba(100,240,200,0.25);backdrop-filter:blur(12px);display:none}
.map-popup.show{display:block}
.lower{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.lower .g-panel{flex:1;min-width:200px}
.ticker-wrap{overflow:hidden;max-height:320px;position:relative}
.ticker-track{display:flex;flex-direction:column}
.tk-card{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer}
.tk-card:hover{background:rgba(100,240,200,0.04)}
.tk-card.urgent{border-left:2px solid var(--danger)}
.tk-src{font-family:var(--mono);font-size:8px;letter-spacing:0.08em;text-transform:uppercase;padding:1px 5px;border:1px solid;display:inline-block;margin-right:4px}
.tk-head{font-size:11px;line-height:1.35;color:#c8d8d2;margin-top:3px}
.tk-time{font-family:var(--mono);font-size:8px;color:var(--dim);margin-left:6px}
.metrics-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px}
.mc{padding:10px;border:1px solid rgba(255,255,255,0.05);background:rgba(255,255,255,0.02)}
.mc .ml{font-family:var(--mono);font-size:9px;text-transform:uppercase;color:var(--dim)}
.mc .mv{font-family:var(--mono);font-size:18px;font-weight:600;margin-top:6px;display:block}
.idea-card{padding:10px;border:1px solid rgba(100,240,200,0.1);background:rgba(100,240,200,0.03);margin-bottom:6px}
.idea-type{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:2px 6px;border:1px solid;display:inline-block}
.idea-type.long{color:var(--accent);border-color:rgba(100,240,200,0.3)}
.idea-title{font-size:12px;font-weight:600}
.signal-row{padding:8px 10px;border-left:2px solid rgba(100,240,200,0.2);margin-bottom:4px;background:rgba(255,255,255,0.02)}
.signal-row strong{font-family:var(--mono);font-size:10px;display:block}
.signal-row p{font-size:11px;color:#c8d8d2}
.sm{display:flex;align-items:center;justify-content:space-between;padding:8px;border:1px solid rgba(255,255,255,0.04)}
.sm .sml{font-family:var(--mono);font-size:10px}
.sm .smb{flex:1;height:4px;margin:0 10px;background:rgba(255,255,255,0.06);border-radius:2px}
.sm .smb span{display:block;height:100%;background:linear-gradient(90deg,rgba(68,204,255,0.3),var(--accent))}
.sm .smv{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--accent)}
.delta-list{max-height:160px;overflow-y:auto}
.delta-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-family:var(--mono);font-size:10px;border-bottom:1px solid rgba(255,255,255,0.04)}
.delta-badge{font-family:var(--mono);font-size:8px;padding:1px 4px;border-radius:2px}
.delta-badge.up{color:#81c784;border:1px solid rgba(129,199,132,0.3)}
.delta-badge.new{color:#4dd0e1;border:1px solid rgba(77,208,225,0.3)}
.search-toggle-btn{position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg,#64f0c8,#44ccff);color:#03140d;border:none;padding:12px 20px;border-radius:30px;cursor:pointer;font-weight:bold;z-index:1000;font-family:var(--mono);font-size:12px}
.search-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.9);width:90%;max-width:800px;max-height:85vh;background:rgba(6,14,22,0.98);border:1px solid rgba(100,240,200,0.3);backdrop-filter:blur(20px);border-radius:12px;z-index:1002;opacity:0;visibility:hidden;transition:all 0.3s ease;display:flex;flex-direction:column;overflow:hidden}
.search-panel.open{opacity:1;visibility:visible;transform:translate(-50%,-50%) scale(1)}
.search-panel-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid rgba(100,240,200,0.2)}
.search-panel-header h3{font-family:var(--mono);font-size:14px;color:var(--accent)}
.close-search{background:none;border:1px solid rgba(100,240,200,0.3);color:var(--dim);width:30px;height:30px;border-radius:50%;cursor:pointer}
.search-input-area{padding:20px;display:flex;gap:12px;border-bottom:1px solid rgba(255,255,255,0.05)}
.search-input-area input{flex:1;background:rgba(10,20,32,0.8);border:1px solid rgba(100,240,200,0.3);color:var(--text);padding:12px 16px;font-family:var(--mono);border-radius:8px}
.search-input-area button{background:linear-gradient(135deg,#64f0c8,#44ccff);color:#03140d;border:none;padding:12px 24px;border-radius:8px;font-family:var(--mono);font-weight:bold;cursor:pointer}
.quick-companies{padding:12px 20px;display:flex;flex-wrap:wrap;gap:8px;border-bottom:1px solid rgba(255,255,255,0.05)}
.quick-company{background:rgba(100,240,200,0.1);border:1px solid rgba(100,240,200,0.2);padding:6px 12px;border-radius:20px;font-size:11px;font-family:var(--mono);cursor:pointer;color:var(--dim)}
.quick-company:hover{background:rgba(100,240,200,0.2);color:var(--accent)}
.search-results-area{flex:1;overflow-y:auto;padding:20px}
.search-result-card{background:rgba(10,20,32,0.6);border-left:3px solid var(--accent);padding:15px;margin-bottom:15px;border-radius:6px}
.search-result-title{font-family:var(--mono);font-size:12px;font-weight:bold;color:var(--accent)}
.search-result-content{font-size:12px;color:#c8d8d2;margin-top:8px}
.verification-links-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;margin-top:15px}
.verification-link{font-size:10px;font-family:var(--mono);padding:6px;background:rgba(255,255,255,0.03);border-radius:4px}
.verification-link a{color:var(--dim);text-decoration:none}
.search-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:1001;opacity:0;visibility:hidden}
.search-overlay.open{opacity:1;visibility:visible}
@media(max-width:1100px){.grid{display:flex;flex-direction:column}}
</style>
</head>
<body>
<div id="boot">
  <div class="logo-ring"><span class="logo-text">CRUCIX</span></div>
  <div id="bootLines"></div>
  <div id="bootFinal">TERMINAL ACTIVE</div>
</div>
<div class="bg-radial" id="bgRadial"></div>
<div class="bg-grid" id="bgGrid"></div>
<div class="scanline" id="scanline"></div>
<div id="main">
  <div class="topbar" id="topbar"></div>
  <div class="grid">
    <div class="col" id="leftRail"></div>
    <div class="col" id="centerCol">
      <div class="map-region-bar" id="mapRegionBar"></div>
      <div class="map-container" id="mapContainer">
        <div id="globeViz"></div>
        <svg id="flatMapSvg" style="display:none;width:100%;height:100%;position:absolute;top:0;left:0;cursor:grab"></svg>
        <div class="map-legend" id="mapLegend"></div>
        <div class="map-hint" id="mapHint">DRAG TO ROTATE · SCROLL TO ZOOM</div>
        <div class="map-controls">
          <button class="map-ctrl-btn" onclick="mapZoom(1.5)">+</button>
          <button class="map-ctrl-btn" onclick="mapZoom(0.67)">&minus;</button>
          <button class="map-ctrl-btn map-toggle" id="flightToggle" onclick="toggleFlights()">&#9992;</button>
        </div>
        <button class="proj-toggle" id="projToggle" onclick="toggleMapMode()">FLAT MODE</button>
        <div class="map-popup" id="mapPopup"><button class="pp-close" onclick="closePopup()">&times;</button><div class="pp-head"></div><div class="pp-text"></div><div class="pp-meta"></div></div>
      </div>
      <div class="lower" id="lowerGrid"></div>
    </div>
    <div class="col" id="rightRail"></div>
  </div>
</div>

<button class="search-toggle-btn" onclick="toggleSearchPanel()">🔍 DUE DILIGENCE SEARCH</button>
<div class="search-overlay" id="searchOverlay" onclick="closeSearchPanel()"></div>
<div class="search-panel" id="searchPanel">
  <div class="search-panel-header"><h3>🔍 COMPANY DUE DILIGENCE</h3><button class="close-search" onclick="closeSearchPanel()">✕</button></div>
  <div class="search-input-area"><input type="text" id="searchCompanyInput" placeholder="Enter company name (e.g., Lockheed Martin, BAE Systems)" autocomplete="off"><button onclick="performCompanySearch()">SEARCH</button></div>
  <div class="quick-companies"><span style="color:var(--dim);font-size:10px">Quick:</span>
    <span class="quick-company" onclick="quickSearch('Lockheed Martin')">Lockheed Martin</span>
    <span class="quick-company" onclick="quickSearch('BAE Systems')">BAE Systems</span>
    <span class="quick-company" onclick="quickSearch('Raytheon')">Raytheon</span>
    <span class="quick-company" onclick="quickSearch('Northrop Grumman')">Northrop Grumman</span>
    <span class="quick-company" onclick="quickSearch('Rheinmetall')">Rheinmetall</span>
  </div>
  <div class="search-results-area" id="searchResultsArea"><div style="text-align:center;padding:40px;color:var(--dim)">🔍 Enter a company name to begin due diligence</div></div>
</div>

<script>
// ===== DATA =====
let D = null;
let globe = null;
let globeInitialized = false;
let flightsVisible = true;
let lowPerfMode = false;
let isFlat = false;
let currentRegion = 'world';
let flatSvg, flatProjection, flatPath, flatG, flatZoom, flatW, flatH;

// ===== HELPER FUNCTIONS =====
function t(key, fallback) { return fallback || key; }
function getAge(d) { const ms = Date.now() - new Date(d).getTime(); const h = Math.floor(ms / 3600000); if (h < 1) return 'just now'; if (h < 24) return h + 'h ago'; return Math.floor(h / 24) + 'd ago'; }
function cleanText(t) { return t.replace(/&#39;/g, "'").replace(/&amp;/g, "&"); }

// ===== SEARCH PANEL =====
function toggleSearchPanel() { document.getElementById('searchPanel').classList.toggle('open'); document.getElementById('searchOverlay').classList.toggle('open'); }
function closeSearchPanel() { document.getElementById('searchPanel').classList.remove('open'); document.getElementById('searchOverlay').classList.remove('open'); }
function quickSearch(c) { document.getElementById('searchCompanyInput').value = c; performCompanySearch(); }
async function performCompanySearch() {
  const query = document.getElementById('searchCompanyInput').value.trim();
  if (!query) return;
  const resultsDiv = document.getElementById('searchResultsArea');
  resultsDiv.innerHTML = '<div style="text-align:center;padding:40px;color:var(--accent)">🔍 Searching...</div>';
  try {
    const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
    const data = await response.json();
    if (!data.success) { resultsDiv.innerHTML = `<div style="color:var(--danger);text-align:center">❌ ${data.error}</div>`; return; }
    let html = '';
    if (data.wikipedia) html += `<div class="search-result-card"><div class="search-result-title">📖 Wikipedia: ${data.wikipedia.title}</div><div class="search-result-content">${data.wikipedia.extract ? data.wikipedia.extract.substring(0,400)+'...' : data.wikipedia.description}</div><a href="${data.wikipedia.url}" target="_blank" style="color:var(--accent2);font-size:11px">Read more →</a></div>`;
    if (data.duckduckgo) html += `<div class="search-result-card"><div class="search-result-title">🔍 DuckDuckGo</div><div class="search-result-content">${data.duckduckgo.abstract ? data.duckduckgo.abstract.substring(0,500)+'...' : ''}</div></div>`;
    if (data.verificationLinks) html += `<div class="search-result-card"><div class="search-result-title">🛡️ Due Diligence Links</div><div class="verification-links-grid">
      <div class="verification-link">📋 <a href="${data.verificationLinks.openCorporates}" target="_blank">OpenCorporates</a></div>
      <div class="verification-link">⚖️ <a href="${data.verificationLinks.ofacSanctions}" target="_blank">OFAC Sanctions</a></div>
      <div class="verification-link">📰 <a href="${data.verificationLinks.defenseNews}" target="_blank">Defense News</a></div>
      <div class="verification-link">💰 <a href="${data.verificationLinks.secEdgar}" target="_blank">SEC EDGAR</a></div></div></div>`;
    resultsDiv.innerHTML = html || '<div style="text-align:center;color:var(--dim)">No results found</div>';
  } catch(e) { resultsDiv.innerHTML = `<div style="color:var(--danger)">❌ Error: ${e.message}</div>`; }
}

// ===== MAP FUNCTIONS =====
function mapZoom(factor) { if (globe) { const pov = globe.pointOfView(); globe.pointOfView({ altitude: pov.altitude / factor }, 300); } }
function closePopup() { document.getElementById('mapPopup').classList.remove('show'); }
function showPopup(event, head, text, meta) {
  const popup = document.getElementById('mapPopup');
  const container = document.getElementById('mapContainer');
  const rect = container.getBoundingClientRect();
  let left = event?.clientX ? event.clientX - rect.left + 10 : rect.width / 2 - 140;
  let top = event?.clientY ? event.clientY - rect.top - 10 : rect.height / 2 - 60;
  popup.style.left = left + 'px'; popup.style.top = top + 'px';
  popup.querySelector('.pp-head').textContent = head || '';
  popup.querySelector('.pp-text').innerHTML = text || '';
  popup.classList.add('show');
}
function setRegion(r) { currentRegion = r; document.querySelectorAll('.region-btn').forEach(b => b.classList.toggle('active', b.dataset.region === r)); if (globe) globe.pointOfView({ lat: 20, lng: 20, altitude: 1.5 }, 800); }
function toggleFlights() { flightsVisible = !flightsVisible; const btn = document.getElementById('flightToggle'); if (btn) btn.classList.toggle('off', !flightsVisible); if (globe) globe.arcsData(flightsVisible ? sampleArcs : []); }
function toggleMapMode() { isFlat = !isFlat; const btn = document.getElementById('projToggle'); const globeEl = document.getElementById('globeViz'); const flatEl = document.getElementById('flatMapSvg'); btn.textContent = isFlat ? 'GLOBE MODE' : 'FLAT MODE'; if (isFlat) { globeEl.style.display = 'none'; flatEl.style.display = 'block'; initFlatMap(); } else { flatEl.style.display = 'none'; globeEl.style.display = 'block'; if (!globe) initGlobe(); } }

const sampleArcs = [{ startLat: 30, startLng: 44, endLat: 40.6, endLng: -73.8, color: ['rgba(100,240,200,0.4)', 'rgba(100,240,200,0.08)'] }];

function initGlobe() {
  const container = document.getElementById('mapContainer');
  const w = container.clientWidth, h = container.clientHeight || 560;
  globe = Globe()
    .width(w).height(h)
    .globeImageUrl('//unpkg.com/three-globe@2.33.0/example/img/earth-night.jpg')
    .backgroundColor('rgba(0,0,0,0)')
    .showGraticules(true)
    .pointAltitude(0.01).pointRadius(0.3).pointColor(() => '#64f0c8')
    .pointLabel(d => `<b>${d.popHead || ''}</b><br>${d.popText || ''}`)
    .onPointClick((pt, ev) => showPopup(ev, pt.popHead, pt.popText))
    (document.getElementById('globeViz'));
  const points = [
    { lat: 30, lng: 44, popHead: 'Middle East Air', popText: 'Air traffic monitoring' },
    { lat: 24, lng: 120, popHead: 'Taiwan Strait', popText: 'Regional air activity' },
    { lat: 49, lng: 32, popHead: 'Ukraine Region', popText: 'Conflict zone monitoring' }
  ];
  globe.pointsData(points);
  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.3;
  globeInitialized = true;
}

function initFlatMap() {
  const container = document.getElementById('mapContainer');
  flatW = container.clientWidth; flatH = container.clientHeight || 560;
  flatSvg = d3.select('#flatMapSvg').attr('viewBox', `0 0 ${flatW} ${flatH}`);
  flatProjection = d3.geoNaturalEarth1().fitSize([flatW - 20, flatH - 20], { type: 'Sphere' }).translate([flatW / 2, flatH / 2]);
  flatPath = d3.geoPath(flatProjection);
  flatG = flatSvg.append('g');
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(r => r.json())
    .then(world => {
      const countries = topojson.feature(world, world.objects.countries);
      flatG.selectAll('path.land').data(countries.features).enter().append('path').attr('class', 'land').attr('d', flatPath).attr('fill', 'rgba(100,240,200,0.03)').attr('stroke', 'rgba(100,240,200,0.1)');
      flatG.append('path').datum(d3.geoGraticule()).attr('class', 'graticule').attr('d', flatPath).attr('fill', 'none').attr('stroke', 'rgba(100,240,200,0.04)');
    });
}
